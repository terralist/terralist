# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  TOOLS_DIR: "{{.ROOT_DIR}}/tools"
  TOOLS_BIN_DIR: "{{.TOOLS_DIR}}/bin"

tasks:
  tool:build:
    desc: "Build a Go tool from the tools module."
    internal: true
    requires:
      vars: [TOOL_PKG, TOOL_NAME]
    status:
      - test -f {{.TOOLS_BIN_DIR}}/{{.TOOL_NAME}}
      - test {{.TOOLS_BIN_DIR}}/{{.TOOL_NAME}} -nt {{.TOOLS_DIR}}/go.sum
    cmds:
      - go build -C {{.TOOLS_DIR}} -o bin/{{.TOOL_NAME}} {{.TOOL_PKG}}

  tidy:
    desc: "Install all Terralist dependencies and tools."
    silent: true
    cmds:
      - npm install -g yarn && yarn --cwd ./web install
      - go mod tidy
      - cd {{.TOOLS_DIR}} && go mod tidy

  server:clean:
    desc: "Remove web build output, web/node_modules, and the Go build cache."
    cmds:
      - rm -rf web/dist web/node_modules
      - go clean -cache

  build:frontend:
    desc: "Build the web application."
    silent: true
    dir: web
    cmds:
      - yarn install
      - yarn build

  build:backend:
    desc: |
      Build the backend application.
      The build mode defaults to 'release'. Debug mode can be enabled
      by passing the '--debug' CLI argument (as '-- --debug').
    silent: true
    vars:
      WITH_DEBUG_MODE: '{{or .WITH_DEBUG_MODE (has "--debug" .CLI_ARGS_LIST)}}'
      WITH_COVER: '{{or .WITH_COVER (has "--cover" .CLI_ARGS_LIST)}}'
      MODE: '{{ternary "debug" "release" (eq .WITH_DEBUG_MODE "true")}}'
      BRANCH:
        sh: git rev-parse --abbrev-ref HEAD
      COMMIT_HASH:
        sh: git rev-parse --short HEAD
      LATEST_TAG:
        sh: git tag | tail -n 1
      TERRALIST_VERSION: '{{.LATEST_TAG}}-{{regexReplaceAll "[^a-zA-Z0-9-]+" .BRANCH "--"}}+{{.COMMIT_HASH}}'
      BINARY_FILE_NAME: '{{printf "terralist%s" (ternary ".exe" "" (eq OS "windows"))}}'
    env:
      TERRALIST_VERSION: "{{.TERRALIST_VERSION}}"
    cmds:
      - cmd: touch ./web/dist/.gitkeep
        ignore_error: true
      - go mod download
      - >-
        go build {{if eq .WITH_COVER "true"}}-cover{{end}} \
          -o={{.BINARY_FILE_NAME}} \
          -v \
          -ldflags="-X 'main.Version={{.TERRALIST_VERSION}}' \
                    -X 'main.CommitHash={{.COMMIT_HASH}}' \
                    -X 'main.BuildTimestamp={{now | date "2006-01-02T15:04:05"}}' \
                    -X 'main.Mode={{.MODE}}'" \
          ./cmd/terralist/main.go
      - echo "Executable wrote to '{{ .BINARY_FILE_NAME }}'."

  build:
    desc: "Build Terralist."
    silent: true
    vars:
      WITH_DEBUG_MODE: '{{or .WITH_DEBUG_MODE (has "--debug" .CLI_ARGS_LIST)}}'
      WITH_COVER: '{{or .WITH_COVER (has "--cover" .CLI_ARGS_LIST)}}'
    cmds:
      - task: build:frontend
      - task: build:backend
        vars:
          WITH_DEBUG_MODE: "{{.WITH_DEBUG_MODE}}"
          WITH_COVER: "{{.WITH_COVER}}"

  lint:frontend:
    desc: "Run frontend linters."
    vars:
      SHOULD_FIX: '{{has "--fix" .CLI_ARGS_LIST}}'
    silent: true
    dir: web
    cmds:
      - yarn run {{ternary "format:write" "format:check" (eq .SHOULD_FIX "true")}}
      - yarn run check
      - yarn run {{ternary "lint:fix" "lint:check" (eq .SHOULD_FIX "true")}}

  lint:backend:
    desc: "Run backend linters."
    vars:
      SHOULD_FIX: '{{has "--fix" .CLI_ARGS_LIST}}'
    silent: true
    cmds:
      - task: tool:build
        vars:
          TOOL_PKG: github.com/golangci/golangci-lint/v2/cmd/golangci-lint
          TOOL_NAME: golangci-lint
      - '{{.TOOLS_BIN_DIR}}/golangci-lint run ./... {{ternary "--fix" "" (eq .SHOULD_FIX "true")}}'

  lint:
    desc: |
      Runs all Terralist linters.
      Launches into execution all Terralist linters (for both backend and frontend).
      Can also be used to automatically fix all issues found by passing the
      `--fix` CLI argument (as `-- --fix`).
    silent: true
    cmds:
      - task: lint:frontend
      - task: lint:backend

  test:generate-mocks:
    desc: "Generate necessary mock files for the tests to be executed."
    silent: true
    vars:
      MOCK_FILES:
        sh: find ./ -type f -name 'mocks.go'
    cmds:
      - task: tool:build
        vars:
          TOOL_PKG: github.com/vektra/mockery/v3
          TOOL_NAME: mockery
      - >-
        {{if eq .MOCK_FILES ""}}
          {{.TOOLS_BIN_DIR}}/mockery
        {{else if .CLI_FORCE}}
          echo "{{.MOCK_FILES}}" | xargs rm; \
          {{.TOOLS_BIN_DIR}}/mockery
        {{else}}
          echo 'Mocks are already created. Re-run with --force if you wish to overwrite them.'
        {{end}}

  test:server:
    desc: "Start the Terralist server for E2E tests."
    silent: true
    vars:
      BINARY_FILE_NAME: '{{printf "terralist%s" (ternary ".exe" "" (eq OS "windows"))}}'
      TEST_RUN_ID: '{{now | date "20060102150405"}}'
    env:
      TERRALIST_PORT: "5758"
      TERRALIST_LOG_LEVEL: "debug"

      TERRALIST_RBAC_POLICY_PATH: "{{.USER_WORKING_DIR}}/e2e/policy.csv"

      TERRALIST_MASTER_API_KEY: "e2e-master-api-key-00000000-0000-0000-0000-000000000000"

      TERRALIST_OAUTH_PROVIDER: "oidc"
      TERRALIST_OI_CLIENT_ID: "e2e-test-client"
      TERRALIST_OI_CLIENT_SECRET: "e2e-test-secret"
      TERRALIST_OI_HOST: "http://localhost:8080/default"

      TERRALIST_TOKEN_SIGNING_SECRET: "e2e-test-secret"

      TERRALIST_DATABASE_BACKEND: "sqlite"
      TERRALIST_SQLITE_PATH: "test-run-{{.TEST_RUN_ID}}.db"

      TERRALIST_SESSION_STORE: "database"
      TERRALIST_COOKIE_SECRET: "e2e-test-secret-e2e-test-secret!"

      TERRALIST_MODULES_STORAGE_RESOLVER: "s3"
      TERRALIST_PROVIDERS_STORAGE_RESOLVER: "s3"
      TERRALIST_S3_ENDPOINT: "http://localhost:9000"
      TERRALIST_S3_BUCKET_NAME: "terralist"
      TERRALIST_S3_BUCKET_REGION: "us-east-1"
      TERRALIST_S3_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
      TERRALIST_S3_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      TERRALIST_S3_USE_PATH_STYLE: "true"
      TERRALIST_S3_SERVER_SIDE_ENCRYPTION: "none"

      GOCOVERDIR: "{{.USER_WORKING_DIR}}/coverage/e2e"
    cmds:
      - task: build
        vars:
          WITH_DEBUG_MODE: "true"
          WITH_COVER: "true"
      # Stop any lingering e2e containers from a prior run that was killed
      # before its cleanup could run. Without this, port 9000/8080 may be
      # held by an orphan and the subsequent `docker run` will fail.
      - cmd: |
          ids=$(docker ps -q --filter 'name=^terralist-(rustfs|mock-oauth2)-e2e-')
          [ -n "$ids" ] && docker stop $ids || true
        ignore_error: true
      - defer: rm -f $TERRALIST_SQLITE_PATH
      - defer:
          cmd: docker stop terralist-rustfs-e2e-{{.TEST_RUN_ID}} terralist-mock-oauth2-e2e-{{.TEST_RUN_ID}}
          ignore_error: true
      - defer:
          cmd: pkill -f "{{.BINARY_FILE_NAME}} server"
          ignore_error: true
      - >
        docker run
        --rm
        --detach
        --name=terralist-rustfs-e2e-{{.TEST_RUN_ID}}
        --publish=9000:9000
        --env=RUSTFS_ACCESS_KEY=$TERRALIST_S3_ACCESS_KEY_ID
        --env=RUSTFS_SECRET_KEY=$TERRALIST_S3_SECRET_ACCESS_KEY
        --health-cmd="curl -f http://localhost:9000/health"
        --health-interval=10s
        --health-timeout=5s
        --health-retries=10
        rustfs/rustfs:latest
      - >
        docker run
        --rm
        --detach
        --name=terralist-mock-oauth2-e2e-{{.TEST_RUN_ID}}
        --publish=8080:8080
        --env=SERVER_PORT=8080
        --env='JSON_CONFIG={"interactiveLogin":false,"httpServer":"NettyWrapper","tokenCallbacks":[{"issuerId":"default","tokenExpiry":3600,"requestMappings":[{"requestParam":"grant_type","match":"*","claims":{"sub":"e2e-test-user","email":"admin@terralist.io"}}]}]}'
        ghcr.io/navikt/mock-oauth2-server:2.1.10
      - >
        until [ "$(docker inspect --format '{{ "{{" }}.State.Health.Status{{ "}}" }}' terralist-rustfs-e2e-{{.TEST_RUN_ID}} 2>/dev/null)" = "healthy" ]; do
          sleep 1;
        done
      - mkdir -p $GOCOVERDIR
      - ./{{.BINARY_FILE_NAME}} server &
      - cmd: read -p "Press any key to stop..."
        ignore_error: true

  test:unit:
    desc: "Run all unit tests."
    silent: true
    vars:
      WITH_SUMMARY: '{{has "--summary" .CLI_ARGS_LIST}}'
      WITH_COVER: '{{or .WITH_COVER (has "--cover" .CLI_ARGS_LIST)}}'
      COVER_PROFILE: "coverage/unit.txt"
      ALL_PACKAGES:
        sh: go list ./...
      TEST_EXCLUSIONS: '{{list "mocks" "cmd" "models" "e2e" | join "|"}}'
      TEST_PACKAGES:
        sh: >-
          {{- $excl := .TEST_EXCLUSIONS -}}
          {{- $pkgs := (list) -}}
          {{- range $i, $pkg := (splitList "\n" .ALL_PACKAGES) -}}
            {{- if not (regexMatch (printf "[/]%s[/]?" $excl) $pkg) -}}
              {{- $pkgs = append $pkgs $pkg -}}
            {{- end -}}
          {{- end -}}
          echo "{{$pkgs | join " "}}"
    cmds:
      - task: test:generate-mocks
      - task: tool:build
        vars:
          TOOL_PKG: gotest.tools/gotestsum
          TOOL_NAME: gotestsum
      - cmd: mkdir -p coverage
        ignore_error: true
      - >-
        {{- if eq .WITH_SUMMARY "true" -}}
        {{.TOOLS_BIN_DIR}}/gotestsum -f testname -- -count=1 {{if eq .WITH_COVER "true"}}-coverprofile={{.COVER_PROFILE}}{{end}} {{.TEST_PACKAGES}}
        {{- else -}}
        go test -count=1 {{if eq .WITH_COVER "true"}}-coverprofile={{.COVER_PROFILE}}{{end}} {{.TEST_PACKAGES}}
        {{- end -}}

  test:unit:frontend:
    desc: "Run frontend unit tests."
    silent: true
    dir: web
    cmds:
      - yarn run test:unit

  test:e2e:
    desc: "Run all E2E tests."
    silent: true
    cmds:
      - echo 'WARNING! Make sure to have a Terralist server up-and-running for the tests to run against. Use `task test:server` to start one.'
      - curl -f "http://localhost:5758/check/readyz"
      - go test -v -count=1 ./e2e/...
      - cd e2e/frontend && npx playwright test

  test:
    desc: "Run all tests."
    silent: true
    cmds:
      - task: test:unit
        vars:
          WITH_COVER: "true"
      - task: test:unit:frontend
      - task: test:e2e

  test:coverage:
    desc: "Generate test coverage report."
    silent: true
    env:
      GOCOVERDIR: "{{.USER_WORKING_DIR}}/coverage/e2e"
    cmds:
      - go tool covdata merge -i=./coverage/e2e -o=coverage
      - go tool covdata textfmt -i=coverage/e2e -o coverage/e2e.txt
      - 'echo "mode: set" > coverage/merged.txt'
      - tail -n +2 coverage/unit.txt >> coverage/merged.txt
      - tail -n +2 coverage/e2e.txt >> coverage/merged.txt
      - grep -vE 'terralist\/(e2e|mocks)|\/mocks.go:|node_modules' coverage/merged.txt > coverage/merged_filtered.txt
      - go tool cover -func=coverage/merged_filtered.txt
