name: Test

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: |
            go.sum
            tools/go.sum

      - name: Install task
        uses: arduino/setup-task@v2.0.0

      - name: Install dependencies
        run: task --verbose tidy

      - name: Generate mocks
        run: task test:generate-mocks

      - name: Run backend linters
        run: task --verbose lint:backend

      - name: Run frontend linters
        run: task --verbose lint:frontend

      - name: Build frontend
        run: task --verbose build:frontend

      - name: Run unit tests
        run: task --verbose test:unit -- --cover

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit.txt
          retention-days: 1

  build-terralist-binary:
    name: Build Terralist
    runs-on: ubuntu-24.04

    container: ghcr.io/terralist/test-base:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache Go Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.mod', 'go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Yarn Packages
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            web/node_modules_cache
          key: yarn-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('web/package.json', 'web/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-${{ runner.arch }}-

      - name: Set yarn cache folder
        run: yarn config set cache-folder web/node_modules_cache

      - name: Mark repo clone as safe
        run: git config --global --add safe.directory /__w/terralist/terralist

      - name: Build frontend
        run: task --verbose build:frontend

      - name: Build Terralist with coverage instrumentation
        run: task --verbose build:backend -- --release --cover

      - name: Save binary
        uses: actions/upload-artifact@v4
        with:
          name: terralist
          path: terralist
          if-no-files-found: error
          retention-days: 1

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-24.04

    needs: [build-terralist-binary]

    strategy:
      fail-fast: false
      matrix:
        database-backend: [postgresql, sqlite, mysql]

    container: ghcr.io/terralist/test-base:latest

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:18.1
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: "terralist"
          POSTGRES_PASSWORD: "terralist"
          POSTGRES_DB: "terralist"
      mysql:
        image: public.ecr.aws/docker/library/mysql:9.6
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306
        env:
          MYSQL_USER: "terralist"
          MYSQL_PASSWORD: "terralist"
          MYSQL_DATABASE: "terralist"
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      rustfs:
        image: rustfs/rustfs:latest
        ports:
          - 9000:9000
        env:
          RUSTFS_ACCESS_KEY: AKIAIOSFODNN7EXAMPLE
          RUSTFS_SECRET_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      mock-oauth2:
        image: ghcr.io/navikt/mock-oauth2-server:2.1.10
        ports:
          - 8080:8080
        env:
          SERVER_PORT: 8080
          JSON_CONFIG: >
            {
              "interactiveLogin": false,
              "httpServer": "NettyWrapper",
              "tokenCallbacks": [
                {
                  "issuerId": "default",
                  "tokenExpiry": 3600,
                  "requestMappings": [
                    {
                      "requestParam": "grant_type",
                      "match": "*",
                      "claims": {
                        "sub": "e2e-test-user",
                        "email": "admin@terralist.io"
                      }
                    }
                  ]
                }
              ]
            }

    env:
      TERRALIST_PORT: 5758
      TERRALIST_URL: "https://localhost:5758"

      TERRALIST_LOG_LEVEL: debug

      TERRALIST_OAUTH_PROVIDER: oidc
      TERRALIST_OI_CLIENT_ID: e2e-test-client
      TERRALIST_OI_CLIENT_SECRET: e2e-test-secret
      TERRALIST_OI_AUTHORIZE_URL: "http://mock-oauth2:8080/default/authorize"
      TERRALIST_OI_TOKEN_URL: "http://mock-oauth2:8080/default/token"
      TERRALIST_OI_USERINFO_URL: "http://mock-oauth2:8080/default/userinfo"
      TERRALIST_TOKEN_SIGNING_SECRET: "somerandomvalue"

      TERRALIST_SESSION_STORE: "cookie"
      TERRALIST_COOKIE_SECRET: "someotherrandomvalue"

      TERRALIST_MASTER_API_KEY: "e2e-master-api-key-00000000-0000-0000-0000-000000000000"

      TERRALIST_DATABASE_BACKEND: ${{ matrix.database-backend }}
      TERRALIST_POSTGRES_URL: postgres://terralist:terralist@postgres:5432/terralist
      TERRALIST_MYSQL_HOST: mysql
      TERRALIST_MYSQL_PORT: 3306
      TERRALIST_MYSQL_USERNAME: terralist
      TERRALIST_MYSQL_PASSWORD: terralist
      TERRALIST_MYSQL_DATABASE: terralist

      TERRALIST_MODULES_STORAGE_RESOLVER: "s3"
      TERRALIST_PROVIDERS_STORAGE_RESOLVER: "s3"
      TERRALIST_S3_ENDPOINT: "http://rustfs:9000"
      TERRALIST_S3_BUCKET_NAME: "terralist"
      TERRALIST_S3_BUCKET_REGION: "us-east-1"
      TERRALIST_S3_ACCESS_KEY_ID: "AKIAIOSFODNN7EXAMPLE"
      TERRALIST_S3_SECRET_ACCESS_KEY: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      TERRALIST_S3_USE_PATH_STYLE: "true"
      TERRALIST_S3_SERVER_SIDE_ENCRYPTION: "none"

      TERRALIST_RBAC_DEFAULT_ROLE: "readonly"
      TERRALIST_RBAC_POLICY_PATH: ${{ format('{0}/e2e/policy.csv', github.workspace)}}

      TERRALIST_CERT_FILE: "/tmp/terralist.pem"
      TERRALIST_KEY_FILE: "/tmp/terralist-key.pem"

      GOCOVERDIR: ${{ format('{0}/coverage/e2e', github.workspace) }}

    steps:
      - name: Download terralist binary
        uses: actions/download-artifact@v5
        with:
          name: terralist
          path: /usr/local/bin/terralist

      - name: Make Terralist binary executable
        run: |
          chmod +x /usr/local/bin/terralist/terralist
          echo "PATH=$PATH:/usr/local/bin/terralist" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate TLS certificate
        run: |
          mkcert -install
          mkcert -cert-file $TERRALIST_CERT_FILE -key-file $TERRALIST_KEY_FILE localhost 127.0.0.1 localhost.direct

      - name: Configure SQLite path
        if: matrix.database-backend == 'sqlite'
        run: echo "TERRALIST_SQLITE_PATH=$HOME/terralist.db" >> $GITHUB_ENV

      - name: Prepare coverage directory
        run: mkdir -p coverage/e2e

      - name: Spin up Terralist server
        uses: JarvusInnovations/background-action@v1.0.7
        with:
          run: terralist server
          wait-on: |
            https-get://localhost:${{ env.TERRALIST_PORT }}/check/readyz
          wait-for: 30s
          log-output-if: "true"

      - name: Run API E2E Tests
        run: go test -v -count=1 ./e2e/...

      - name: Run Playwright Frontend Tests
        working-directory: e2e/frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test

      - name: Upload e2e coverage
        if: always() && matrix.database-backend == 'sqlite'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage/e2e/
          retention-days: 1

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ matrix.database-backend }}
          path: |
            reports/
            e2e/frontend/test-results/
          retention-days: 7

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-24.04
    needs: [unit-test, e2e-tests]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install task
        uses: arduino/setup-task@v2.0.0

      - name: Download unit test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage/

      - name: Download e2e coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-e2e
          path: coverage/e2e/

      - name: Coverage summary
        run: task test:coverage
